name: Publish Blogs

on:
  push:
    paths:
      - "blogs/**/*.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-blogs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo with full history (needed for diff)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ✅ Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Install deps
      - name: Install deps
        run: npm install

      # ✅ Get only changed markdown files
      - name: Get changed files
        id: changed
        run: |
          files=$(git diff --name-only HEAD~1 HEAD | grep '^blogs/.*\.md$' || true)
          echo "files=$files"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ✅ Publish ONLY changed blogs
      - name: Publish Blogs
        if: steps.changed.outputs.files != ''
        run: |
          set -e
          echo "${{ steps.changed.outputs.files }}" | while read file; do
            if [ -f "$file" ]; then
              echo "📄 Processing $file"
              node scripts/publish.js "$file"
            fi
          done
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

      # ✅ Commit updated published.json
      - name: Commit published state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add published.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update published posts"
            git push
          fi